spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: Eco-Awaaz

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 8
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: EcoAwaazHikariCP

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

server:
  port: ${PORT:10000}
